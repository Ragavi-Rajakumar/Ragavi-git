<!DOCTYPE html>
<html lang="en">

<head>
<title>Ragavi Website</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#6dd5ed,#2193b0);
    font-family: Arial, sans-serif;
}

.box{
    background:white;
    padding:40px;
    width:350px;
    text-align:center;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    animation: fadeIn 1s ease;
}

h1{
    color:#2193b0;
    font-size:40px;
    margin-bottom:10px;
}

p{
    color:#555;
    font-size:20px;
    margin-bottom:25px;
}

button{
    background:#2193b0;
    color:white;
    border:none;
    padding:12px 30px;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#176a84;
    transform:scale(1.05);
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

<script>
function welcomeMessage(){
    alert("Welcome to Ragavi Website!");
}
</script>

</head>

<body>

<div class="box">

<h1>Hello 👋</h1>
<p>This is Ragavi</p>

<button onclick="welcomeMessage()">Welcome</button>

</div>

</body>
</html>
